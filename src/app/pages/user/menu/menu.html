<!-- src/app/pages/menu/menu.html — replace your existing file -->

<!-- Alert toast (renders bottom-right on every addToCart) -->
<app-alert-toast></app-alert-toast>

<section class="menu">

  <h1>Our Menu</h1>

  <!-- SEARCH + FILTER -->
  <div class="menu-controls">
    <input
      type="text"
      placeholder="Search food..."
      [(ngModel)]="searchText"
    />
    <select [(ngModel)]="selectedCategory">
      <option *ngFor="let category of categories">{{ category }}</option>
    </select>

    <!-- Cart icon with live badge -->
    <a routerLink="/cart" class="cart-icon-link">
      🛒
      <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
    </a>
  </div>

  <br />

  <!-- FOOD GRID -->
  <div class="menu-grid">
    <div class="food-card" *ngFor="let food of paginatedFoods">
      <img [src]="food.image" [alt]="food.name" />
      <h3>{{ food.name }}</h3>
      <p>{{ food.description }}</p>
      <div class="food-footer">
        <span class="price">₹{{ food.price }}</span>
        <button (click)="addToCart(food)">
          {{ isInCart(food.id) ? 'Added (' + getQuantity(food.id) + ')' : 'Add to Cart' }}
        </button>
      </div>
    </div>
  </div>

  <!-- PAGINATION -->
  <div class="pagination">
    <button (click)="prevPage()" [disabled]="currentPage === 1">Prev</button>
    <span>Page {{ currentPage }}</span>
    <button (click)="nextPage()">Next</button>
  </div>

</section>
